name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  scan-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Scan Codex plugin
        id: scan
        continue-on-error: true
        uses: hashgraph-online/codex-plugin-scanner/action@a9217aec7327308e84ad72c13bf5e39544ad51f5
        with:
          plugin_dir: "."
          format: sarif
          output: codex-plugin-scanner.sarif
          min_score: 95
          fail_on_severity: high
          install_cisco: "true"

      - name: Upload scanner SARIF
        if: always() && hashFiles('codex-plugin-scanner.sarif') != ''
        uses: github/codeql-action/upload-sarif@51f77329afa6477de8c49fc9c7046c15b9a4e79d
        with:
          sarif_file: codex-plugin-scanner.sarif
          category: codex-plugin-scanner

      - name: Publish scanner summary
        if: always()
        run: |
          echo "## Codex Plugin Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Score: ${{ steps.scan.outputs.score || 'unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Grade: ${{ steps.scan.outputs.grade || 'unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SARIF: codex-plugin-scanner.sarif" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce scanner gate
        if: steps.scan.outcome == 'failure'
        run: exit 1
