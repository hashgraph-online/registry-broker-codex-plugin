name: Release Notes Labels

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-drafter-autolabeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply_release_labels:
    runs-on: ubuntu-latest

    steps:
      - name: Apply release labels
        uses: release-drafter/release-drafter/autolabeler@5de93583980a40bd78603b6dfdcda5b4df377b32
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
